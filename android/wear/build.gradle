apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
    namespace = "com.thoth.dreamarchive.wear"
    compileSdk rootProject.ext.wearCompileSdkVersion

    defaultConfig {
        applicationId "com.thoth.dreamarchive.wear"
        minSdk rootProject.ext.wearMinSdkVersion
        targetSdk rootProject.ext.wearTargetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion rootProject.ext.composeKotlinCompilerVersion
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // Wear Compose (no separate BOM - use explicit versions)
    implementation "androidx.wear.compose:compose-material3:1.0.0-alpha23"
    implementation "androidx.wear.compose:compose-navigation:1.3.1"
    implementation "androidx.wear.compose:compose-foundation:1.3.1"

    // Wear Activity
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'

    // Shared common module
    implementation project(':common')
}
